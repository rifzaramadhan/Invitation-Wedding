# Docker Compose for On-Premises Deployment
# Uses pre-built images from Docker Hub
# Place this file on your deployment server
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wedding_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wedding_network

  backend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/wedding-backend:latest
    container_name: wedding_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      TZ: ${TZ:-Asia/Jakarta}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wedding_network

  frontend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/wedding-frontend:latest
    container_name: wedding_frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html
    restart: unless-stopped
    networks:
      - wedding_network

  nginx:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/wedding-nginx:latest
    container_name: wedding_nginx
    ports:
      - "80:80"
      # Uncomment for HTTPS
      # - "443:443"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      # Uncomment for SSL certificates
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - wedding_network

volumes:
  postgres_data:
  frontend_dist:


networks:
  wedding_network:
    driver: bridge
