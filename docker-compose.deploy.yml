# Docker Compose for On-Premises Deployment
# Uses pre-built images from Docker Hub
# Place this file on your deployment server

services:
  postgres:
    image: postgres:16-alpine
    container_name: wedding_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wedding_network

  backend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/wedding-backend:latest
    container_name: wedding_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - wedding_network

  frontend:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/wedding-frontend:latest
    container_name: wedding_frontend
    ports:
      - "5173:3000"
    restart: unless-stopped
    networks:
      - wedding_network

volumes:
  postgres_data:
  uploads_data:

networks:
  wedding_network:
    driver: bridge
