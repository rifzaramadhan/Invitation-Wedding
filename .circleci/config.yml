# CircleCI Configuration for Wedding Invitation System
# Full CI/CD: Build → Test → Push to Docker Hub → Deploy to On-Prem
version: 2.1

# Orbs for common functionality
orbs:
  node: circleci/node@5.2.0
  docker: circleci/docker@2.4.0

# Reusable commands
commands:
  setup_backend:
    description: "Install backend dependencies"
    steps:
      - run:
          name: Install backend dependencies
          command: npm ci
          working_directory: backend

  setup_frontend:
    description: "Install frontend dependencies"
    steps:
      - run:
          name: Install frontend dependencies
          command: npm ci
          working_directory: frontend

  docker_login:
    description: "Login to Docker Hub"
    steps:
      - run:
          name: Login to Docker Hub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

# Executors
executors:
  node-executor:
    docker:
      - image: cimg/node:20.10
    working_directory: ~/project

  node-with-postgres:
    docker:
      - image: cimg/node:20.10
      - image: cimg/postgres:16.1
        environment:
          POSTGRES_USER: wedding
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: wedding_invitation_test
    working_directory: ~/project

# Jobs
jobs:
  # ============================================
  # CI: Lint and Type Check
  # ============================================
  lint-backend:
    executor: node-executor
    steps:
      - checkout
      - setup_backend
      - run:
          name: TypeScript type check
          command: npm run build
          working_directory: backend

  lint-frontend:
    executor: node-executor
    steps:
      - checkout
      - setup_frontend
      - run:
          name: TypeScript type check
          command: npm run build
          working_directory: frontend

  # ============================================
  # CI: Test with Database
  # ============================================
  test-backend:
    executor: node-with-postgres
    steps:
      - checkout
      - setup_backend
      - run:
          name: Wait for PostgreSQL
          command: |
            for i in $(seq 1 30); do
              if pg_isready -h localhost -U wedding; then
                echo "PostgreSQL is ready"
                break
              fi
              echo "Waiting for PostgreSQL..."
              sleep 1
            done
      - run:
          name: Run database migrations
          command: npm run db:migrate
          working_directory: backend
          environment:
            DATABASE_URL: postgresql://wedding:test_password@localhost:5432/wedding_invitation_test
            JWT_SECRET: test-jwt-secret-for-ci
      - run:
          name: Build backend
          command: npm run build
          working_directory: backend

  # ============================================
  # CD: Build & Push Docker Images to Docker Hub
  # ============================================
  build-and-push-backend:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - docker_login
      - run:
          name: Build backend Docker image
          command: |
            docker build \
              -f backend/Dockerfile.prod \
              -t ${DOCKERHUB_USERNAME}/wedding-backend:${CIRCLE_SHA1} \
              -t ${DOCKERHUB_USERNAME}/wedding-backend:latest \
              backend/
      - run:
          name: Push backend image to Docker Hub
          command: |
            docker push ${DOCKERHUB_USERNAME}/wedding-backend:${CIRCLE_SHA1}
            docker push ${DOCKERHUB_USERNAME}/wedding-backend:latest

  build-and-push-frontend:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - docker_login
      - run:
          name: Build frontend Docker image
          command: |
            docker build \
              -f frontend/Dockerfile.prod \
              -t ${DOCKERHUB_USERNAME}/wedding-frontend:${CIRCLE_SHA1} \
              -t ${DOCKERHUB_USERNAME}/wedding-frontend:latest \
              frontend/
      - run:
          name: Push frontend image to Docker Hub
          command: |
            docker push ${DOCKERHUB_USERNAME}/wedding-frontend:${CIRCLE_SHA1}
            docker push ${DOCKERHUB_USERNAME}/wedding-frontend:latest

# Workflows
workflows:
  version: 2

  # CI Pipeline - Build, Test, Push to Docker Hub
  build-test-push:
    jobs:
      # Stage 1: Lint (parallel)
      - lint-backend
      - lint-frontend

      # Stage 2: Test
      - test-backend:
          requires:
            - lint-backend

      # Stage 3: Build & Push Docker images (only on main)
      - build-and-push-backend:
          requires:
            - test-backend
          filters:
            branches:
              only: main

      - build-and-push-frontend:
          requires:
            - lint-frontend
          filters:
            branches:
              only: main