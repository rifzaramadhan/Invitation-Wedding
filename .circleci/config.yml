# CircleCI Configuration for Wedding Invitation System
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Orbs for common functionality
orbs:
  node: circleci/node@5.2.0
  docker: circleci/docker@2.4.0

# Reusable commands
commands:
  setup_backend:
    description: "Install backend dependencies"
    steps:
      - run:
          name: Install backend dependencies
          command: npm ci
          working_directory: backend

  setup_frontend:
    description: "Install frontend dependencies"
    steps:
      - run:
          name: Install frontend dependencies
          command: npm ci
          working_directory: frontend

# Executors
executors:
  node-executor:
    docker:
      - image: cimg/node:20.10
    working_directory: ~/project

  node-with-postgres:
    docker:
      - image: cimg/node:20.10
      - image: cimg/postgres:16.1
        environment:
          POSTGRES_USER: wedding
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: wedding_invitation_test
    working_directory: ~/project

# Jobs
jobs:
  # Lint and type check backend
  lint-backend:
    executor: node-executor
    steps:
      - checkout
      - setup_backend
      - run:
          name: TypeScript type check
          command: npm run build
          working_directory: backend

  # Lint and type check frontend
  lint-frontend:
    executor: node-executor
    steps:
      - checkout
      - setup_frontend
      - run:
          name: TypeScript type check
          command: npm run build
          working_directory: frontend

  # Build and test backend
  test-backend:
    executor: node-with-postgres
    steps:
      - checkout
      - setup_backend
      - run:
          name: Wait for PostgreSQL
          command: |
            for i in $(seq 1 30); do
              if pg_isready -h localhost -U wedding; then
                echo "PostgreSQL is ready"
                break
              fi
              echo "Waiting for PostgreSQL..."
              sleep 1
            done
      - run:
          name: Run database migrations
          command: npm run db:migrate
          working_directory: backend
          environment:
            DATABASE_URL: postgresql://wedding:test_password@localhost:5432/wedding_invitation_test
            JWT_SECRET: test-jwt-secret-for-ci
      - run:
          name: Build backend
          command: npm run build
          working_directory: backend

  # Build frontend for production
  build-frontend:
    executor: node-executor
    steps:
      - checkout
      - setup_frontend
      - run:
          name: Build frontend
          command: npm run build
          working_directory: frontend
      - persist_to_workspace:
          root: frontend
          paths:
            - dist

  # Build Docker images
  build-docker:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Build backend image
          command: |
            docker build -f backend/Dockerfile.prod -t wedding-backend:${CIRCLE_SHA1} backend/
      - run:
          name: Build frontend image
          command: |
            docker build -f frontend/Dockerfile.prod -t wedding-frontend:${CIRCLE_SHA1} frontend/

  # Deploy to production (manual trigger)
  deploy:
    executor: node-executor
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "${SSH_FINGERPRINT}"
      - run:
          name: Deploy to server
          command: |
            echo "Deploying to production server..."
            # Add your deployment commands here
            # Example: ssh user@server "cd /app && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
            echo "Deployment placeholder - configure your deployment target"

# Workflows
workflows:
  version: 2

  # CI workflow - runs on every push
  build-and-test:
    jobs:
      - lint-backend
      - lint-frontend
      - test-backend:
          requires:
            - lint-backend
      - build-frontend:
          requires:
            - lint-frontend
      - build-docker:
          requires:
            - test-backend
            - build-frontend
          filters:
            branches:
              only:
                - main
                - develop

  # CD workflow - manual deployment to production
  # deploy-production:
