services:
  postgres:
    image: postgres:16-alpine
    container_name: wedding_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wedding_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: wedding_backend_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      TZ: ${TZ:-Asia/Jakarta}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - wedding_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: wedding_frontend_prod
    volumes:
      # Share built static files with nginx
      - frontend_dist:/usr/share/nginx/html
    restart: unless-stopped
    networks:
      - wedding_network

  nginx:
    image: nginx:alpine
    container_name: wedding_nginx_prod
    ports:
      - "80:80"
      # Uncomment below for HTTPS (requires SSL certificates)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - uploads_data:/var/www/uploads:ro
      # Uncomment for SSL certificates
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - wedding_network

volumes:
  postgres_data:
  frontend_dist:
  uploads_data:

networks:
  wedding_network:
    driver: bridge
